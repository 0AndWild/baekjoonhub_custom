<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="css/popup.css" />
    <script src="/library/jquery-3.3.1.min.js"></script>

    <link href="https://cdnjs.cloudflare.com/ajax/libs/semantic-ui/2.4.1/semantic.min.css" rel="stylesheet" />
    <script src="/library/semantic.min.js"></script>
  </head>

  <body>
    <div class="ui grid container">
      <div class="sixteen wide center aligned column">
        <h1 id="title">Baekjoon<span style="color: #0078c3">Hub</span></h1>
        <p id="caption">Sync your code from BOJ to GitHub</p>
        <!-- Authentication mode -->
        <div id="auth_mode" hidden>
          <p class="onboarding">
            <br />
            Authenticate with GitHub to use
            <strong>Baekjoon<span style="color: #f18500">Hub</span></strong>
          </p>
          <button id="authenticate" class="ui secondary button">
            <i class="icon github"></i>
            Authenticate
          </button>
        </div>

        <!-- Repo Hook mode -->
        <div id="hook_mode" hidden>
          <div class="ui segment left aligned modern-panel repo-manage-panel" style="margin-top: 10px">
            <div class="ui tiny header repo-manage-title">Repository 연결</div>
            <p class="repo-manage-help">확장을 사용할 GitHub 저장소를 모달에서 바로 생성/연결합니다.</p>
            <div class="repo-manage-grid">
              <div class="recommend-setting-row">
                <label for="repo_setup_type">연결 방식</label>
                <select id="repo_setup_type" class="ui dropdown compact">
                  <option value="">선택</option>
                  <option value="new">새 Private Repository 생성</option>
                  <option value="link">기존 Repository 연결</option>
                </select>
              </div>
              <div class="recommend-setting-row">
                <label for="repo_org_option">정리 방식</label>
                <select id="repo_org_option" class="ui dropdown compact">
                  <option value="platform">플랫폼 기준 정리</option>
                  <option value="language">언어 기준 정리</option>
                </select>
              </div>
              <div id="repo_select_row" class="recommend-setting-row" hidden>
                <label for="repo_select">내 Repository 선택</label>
                <select id="repo_select" class="ui dropdown compact">
                  <option value="">Repository를 불러오는 중...</option>
                </select>
              </div>
              <div id="repo_name_row" class="recommend-setting-row">
                <label for="repo_name">Repository 이름</label>
                <input id="repo_name" autocomplete="off" type="text" placeholder="예: baekjoon" />
              </div>
              <div id="repo_base_dir_picker_row" class="recommend-setting-row" hidden>
                <label for="repo_base_dir_select">Base Directory 선택 (Repo 트리)</label>
                <select id="repo_base_dir_select" class="ui dropdown compact">
                  <option value="">하위 디렉토리 선택</option>
                </select>
                <div id="repo_base_dir_current" class="repo-base-dir-current"></div>
              </div>
            </div>
            <div class="repo-manage-actions">
              <button id="repo_connect_button" class="ui tiny button repo-connect-btn" disabled>Repo 연결</button>
            </div>
          </div>
        </div>

        <div id="commit_mode" hidden>
          <div class="repo-top-row">
            <div class="repo-linked-info">
              <p id="repo_url" class="ui small header"></p>
              <p id="repo_dir" class="repo-dir-line"></p>
            </div>
            <div class="repo-top-actions">
              <div class="auto-upload-inline">
                <div class="auto-upload-head">
                  <span class="auto-upload-label">자동 업로드</span>
                  <div class="auto-upload-switch">
                    <input type="checkbox" id="onffbox" />
                    <label for="onffbox" id="onffmain">
                      <span id="onffball"></span>
                    </label>
                  </div>
                </div>
                <p class="auto-upload-help">정답 제출 시 코드를 GitHub에 자동 업로드합니다.</p>
              </div>
              <div class="repo-top-action-buttons">
                <button id="repo_unlink_button" class="ui tiny button repo-unlink-btn">Repo 연결 해제</button>
                <button id="github_disconnect_button" class="ui tiny button github-disconnect-btn">GitHub 연결 해제</button>
              </div>
            </div>
          </div>
          <div class="ui small header commit-note" style="margin-bottom: 5px; margin-top: 0px !important">
            Want more features?
            <a style="color: rgb(10, 89, 92) !important" target="_blank" href="https://github.com/0AndWild/baekjoonhub_custom/issues">Request a feature!</a>
          </div>

          <div id="recommendation_panel" class="ui segment left aligned modern-panel" style="margin-top: 12px">
            <div class="recommendation-header">
                <div>
                  <div class="ui tiny header recommend-title" style="margin: 0">BOJ 코테 추천</div>
                  <p class="recommend-subtitle">요일별 유형과 난이도를 기반으로 1~10문제 추천</p>
                </div>
                <div class="recommend-header-actions">
                  <button id="recommend_refresh_button" class="ui tiny button recommend-secondary-btn">다시 추천 받기</button>
                  <button id="recommend_button" class="ui teal tiny button recommend-primary-btn">문제 추천 받기</button>
                </div>
              </div>
            <p id="recommend_status" class="recommend-status"></p>
            <div id="recommend_result" class="recommend-result"></div>

            <details id="recommend_settings" class="recommend-settings" style="margin-top: 10px">
              <summary class="recommend-settings-summary" style="cursor: pointer; font-weight: 600">요일별 추천 설정</summary>
              <div class="recommend-basic-grid">
                <div class="recommend-setting-row">
                  <label for="recommend_count">추천 개수</label>
                  <select id="recommend_count" class="ui dropdown compact">
                    <option value="1">1문제</option>
                    <option value="2">2문제</option>
                    <option value="3">3문제</option>
                    <option value="4">4문제</option>
                    <option value="5">5문제</option>
                    <option value="6">6문제</option>
                    <option value="7">7문제</option>
                    <option value="8">8문제</option>
                    <option value="9">9문제</option>
                    <option value="10">10문제</option>
                  </select>
                </div>
                <div class="recommend-setting-row">
                  <label for="recommend_min_level">최소 난이도</label>
                  <select id="recommend_min_level" class="ui dropdown compact"></select>
                </div>
                <div class="recommend-setting-row">
                  <label for="recommend_max_level">최대 난이도</label>
                  <select id="recommend_max_level" class="ui dropdown compact"></select>
                </div>
                <div class="recommend-setting-row recommend-setting-checkbox-row">
                  <label for="recommend_exclude_non_korean">외국어 문제 제외</label>
                  <label class="recommend-inline-check" for="recommend_exclude_non_korean">
                    <input id="recommend_exclude_non_korean" type="checkbox" checked />
                    <span>한글 제목 문제만 추천</span>
                  </label>
                </div>
              </div>
              <div id="weekday_tag_rows"></div>
              <div class="recommend-setting-actions">
                <button id="reset_recommend_weekday_tags" class="ui mini button">유형 추천조합 초기화</button>
                <button id="save_recommend_settings" class="ui mini button">설정 저장</button>
                <button id="load_recommend_settings" class="ui mini button">설정 불러오기</button>
              </div>
            </details>
          </div>
        </div>
        <p id="repo_manage_status" class="repo-manage-status"></p>
      </div>

      <!-- Generate Socials -->
      <div id="socials" class="sixteen wide column">
        <a title="BaekjoonHub GitHub" href="https://github.com/0AndWild/baekjoonhub_custom" target="_blank"><i class="ui black github icon"></i></a>
        <a title="Email" href="mailto:parkky3563@gmail.com" target="_blank"><i class="ui red envelope icon"></i></a>
        <a title="Patch Notes" href="https://github.com/0AndWild/baekjoonhub_custom/blob/main/README.md" target="_blank"><i class="ui list alternate outline icon"></i></a>
        <a title="BaekjoonHub Home" id="welcome_URL" href="" target="_blank"><i class="ui grey home icon"></i></a>
      </div>
    </div>

    <script src="scripts/oauth2.js"></script>
    <script type="text/javascript" src="popup.js"></script>
  </body>
</html>
